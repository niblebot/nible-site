<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Nible Paper</title>
  <style>
    body{margin:0;background:#070d1b;color:#e9f1ff;font-family:Inter,Segoe UI,Arial,sans-serif}
    .wrap{max-width:900px;margin:0 auto;padding:20px}
    .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .btn{padding:7px 10px;border:1px solid #3f5f9d;border-radius:10px;background:#102247;color:#deebff;text-decoration:none}
    .card{background:#0c1730;border:1px solid #2c4678;border-radius:13px;padding:16px;margin-top:12px}
    .meta{color:#9ab2e3;font-size:13px}
    .diagram{margin-top:10px;background:#0a1225;border:1px solid #2a436f;border-radius:10px;padding:8px}
    .body{white-space:pre-wrap;line-height:1.65;color:#d5e3ff}
  </style>
</head>
<body>
<div class='wrap'>
  <div class='bar'>
    <a class='btn' href='/research/'>All Papers</a>
    <a class='btn' id='src' target='_blank'>Open Legacy Source</a>
    <a class='btn' href='/'>Home</a>
  </div>
  <article class='card'>
    <h1 id='title' style='margin:0 0 6px'>Loading…</h1>
    <div class='meta' id='meta'></div>
    <div class='diagram' id='diagram'></div>
    <div class='body' id='body'></div>
  </article>
</div>
<script>
const id=new URLSearchParams(location.search).get('id');
fetch('/research/data/papers.json').then(r=>r.json()).then(rows=>{
 const p=rows.find(x=>x.id===id)||rows[0];
 document.getElementById('title').textContent=p.title;
 document.getElementById('meta').textContent=`Category: ${p.category} · Paper ID: ${p.id}`;
 document.getElementById('body').textContent=p.body;
 const src=document.getElementById('src'); src.href=p.source;
 const density=Math.min(90,Math.max(20,Math.floor((p.body||'').length/20)));
 document.getElementById('diagram').innerHTML=`<svg viewBox='0 0 260 70' width='100%' height='70'>
   <rect x='10' y='15' width='30' height='${density/2}' fill='#8ab3ff'/>
   <rect x='55' y='10' width='30' height='${density/1.8}' fill='#6fe6c9'/>
   <rect x='100' y='22' width='30' height='${density/2.4}' fill='#ffd37c'/>
   <rect x='145' y='18' width='30' height='${density/2.1}' fill='#c8a3ff'/>
   <text x='10' y='66' fill='#9db3e3' font-size='10'>signal density map</text></svg>`;
});
</script>
</body>
</html>
