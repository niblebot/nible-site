<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nible Paper Reader</title>
  <style>
    body{margin:0;background:#050a15;color:#e9f1ff;font-family:Inter,Segoe UI,Arial,sans-serif}
    .top{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #2e4779;background:#0c1630;position:sticky;top:0}
    .left{display:flex;gap:10px;align-items:center;min-width:0}
    .btn{display:inline-block;padding:7px 10px;border:1px solid #3f5f9f;border-radius:9px;background:#122446;color:#d9e8ff;text-decoration:none}
    .title{font-size:13px;color:#aac0ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70vw}
    iframe{width:100%;height:calc(100vh - 52px);border:0;background:white}
  </style>
</head>
<body>
  <div class="top">
    <div class="left">
      <a class="btn" href="/research/">All Papers</a>
      <a class="btn" href="/">Home</a>
      <div class="title" id="t">Loading…</div>
    </div>
  </div>
  <iframe id="f" sandbox="allow-same-origin allow-scripts"></iframe>
  <script>
    const p=new URLSearchParams(location.search);
    const src=p.get('src')||'/archive/index2.html';
    document.getElementById('t').textContent=src;
    document.getElementById('f').src=src;
  </script>
</body>
</html>
