<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nible</title>
  <style>
    body{font-family:Inter,Segoe UI,Arial,sans-serif;background:#0b1020;color:#f4f7ff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
    .card{max-width:700px;padding:40px;border:1px solid #2b355f;border-radius:18px;background:#121936;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{font-size:52px;margin:0 0 12px;letter-spacing:.5px}
    p{font-size:19px;line-height:1.6;color:#d8def7}
    .tag{display:inline-block;margin-top:16px;padding:8px 12px;border-radius:999px;background:#1f2a57;color:#b9c7ff;font-size:13px}
  </style>
</head>
<body>
  <main class="card">
    <h1>nible</h1>
    <p>Something sharp is coming soon. We're building practical AI tools, growth playbooks, and bite-sized execution systems.</p>
    <span class="tag">Early access launching soon</span>
  </main>
</body>
</html>
